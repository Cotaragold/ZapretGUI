name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish ZapretGUI.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=false
          -o installer/publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Resolve version from tag
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $v"

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" installer\ZapretGUI.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zapret GUI ${{ github.ref_name }}
          files: installer/output/*.exe
          generate_release_notes: true
